name: Deploy Firestore Indexes

on:
  push:
    branches:
      - main
    paths:
      - 'firestore.indexes.json'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-firestore-indexes.yml'

concurrency:
  group: buysedifex-firestore-indexes
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SEDIFEX }}' > $HOME/gcp-key.json

      - name: Set Google credentials
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcp-key.json" >> $GITHUB_ENV

      - name: Deploy Firestore indexes
        run: firebase deploy --only firestore:indexes --project sedifex-web
